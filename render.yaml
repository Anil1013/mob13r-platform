services:
  # --- BACKEND SERVICE ---
  - type: web
    name: mob13r-backend
    env: node
    plan: free
    region: singapore
    rootDir: backend
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 4000
      - key: DATABASE_URL
        fromDatabase:
          name: mob13r-db
          property: connectionString
      - key: FRONTEND_URL
        value: https://mob13r-frontend.onrender.com
      - key: JWT_SECRET
        value: a7d9c31fe28d1e345ddc3a90b5cf4a7b91bde4e9b2e48760b0ac8f78576c1e93

  # --- FRONTEND SERVICE ---
  - type: static
    name: mob13r-frontend
    plan: free
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: build
    envVars:
      - key: REACT_APP_API_URL
        value: https://mob13r-backend.onrender.com/api
      - key: REACT_APP_APP_NAME
        value: Mob13r.api
      - key: REACT_APP_THEME
        value: dark

databases:
  - name: mob13r-db
    plan: free
