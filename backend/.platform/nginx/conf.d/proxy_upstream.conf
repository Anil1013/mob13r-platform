# ✅ AWS Elastic Beanstalk Node.js safe proxy config

# Define upstream (Node app on port 8080)
upstream node_backend {
    server 127.0.0.1:8080;
    keepalive 64;
}

# Pass requests to Node.js app
server {
    listen 80 default_server;
    listen [::]:80 default_server;

    location / {
        proxy_pass http://node_backend;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # 🛡️ Block dangerous file access attempts
    location ~* (\.env|phpunit|\.php|/cgi-bin|wp-content|eval-stdin) {
        return 444;
    }
}
