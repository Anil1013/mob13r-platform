# ✅ Working NGINX config for Elastic Beanstalk Node.js
# (no syntax errors, no duplicate ports, safe from scanner requests)

server {
    listen 80;
    server_name _;

    # Forward all traffic to Node.js app on port 8080
    location / {
        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # 🛡️ Block malicious or unwanted requests
    location ~* (\.env|phpunit|\.php|/cgi-bin|wp-content|eval-stdin) {
        return 444;
    }

    # Optional: custom error page for bots
    error_page 444 /blocked.html;
}
