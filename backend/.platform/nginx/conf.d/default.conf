# ✅ Safe NGINX config for Elastic Beanstalk Node.js

# EB automatically merges this inside its own nginx.conf server block
# So do NOT add another `server {}` wrapper

# Proxy all traffic to the Node.js app
location / {
    proxy_pass http://127.0.0.1:8080;
    proxy_http_version 1.1;
    proxy_set_header Connection "";
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
}

# 🛡️ Block unsafe or scanner requests
location ~* (\.env|phpunit|\.php|/cgi-bin|wp-content|eval-stdin) {
    return 444;
}
