# ✅ Elastic Beanstalk compatible NGINX config for Node.js (Port 8080)

server {
    listen 80;
    server_name _;

# Forward all traffic to Node.js app
location / {
    proxy_pass http://127.0.0.1:8080;
    proxy_http_version 1.1;
    proxy_set_header Connection "";
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
}

# 🛡️ Security: Block access to sensitive files
location ~* (\.env|\.git|phpunit|wp-content|eval-stdin) {
    return 444;
}

# Optional: custom blocked page (you can add a static /blocked.html in public/)
error_page 444 /blocked.html;

# ⚙️ Optimization (optional): prevent hash warnings
types_hash_max_size 2048;
}
