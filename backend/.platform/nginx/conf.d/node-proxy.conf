# ✅ Stable AWS Elastic Beanstalk NGINX config for Node.js backend

server {
    listen 80;
    server_name _;

    # Proxy all requests to the Node.js app running on port 8080
    location / {
        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Optional: Block sensitive files
    location ~* (\.env|\.git|phpunit|wp-content|eval-stdin) {
        return 444;
    }

    error_page 444 /blocked.html;
}
