# ✅ AWS Elastic Beanstalk Node.js proxy configuration

# These directives will merge inside the default server{} block of EB's nginx.conf

# Forward all requests to Node.js running on port 8080
location / {
    proxy_pass http://127.0.0.1:8080;
    proxy_http_version 1.1;
    proxy_set_header Connection "";
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
}

# 🛡️ Security filters to block malicious probes
location ~* (\.env|phpunit|\.php|/cgi-bin|wp-content|eval-stdin) {
    return 444;
}
