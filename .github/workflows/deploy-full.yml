name: 🚀 Smart Auto Deploy Frontend (Amplify) + Backend (Elastic Beanstalk)

on:
  push:
    branches:
      - main

jobs:
  detect_changes:
    runs-on: ubuntu-latest
    outputs:
      frontend_changed: ${{ steps.filter.outputs.frontend }}
      backend_changed: ${{ steps.filter.outputs.backend }}

    steps:
      - name: 🧾 Checkout Repository
        uses: actions/checkout@v4

      - name: 🕵️ Detect which folders changed
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            frontend:
              - 'frontend/**'
            backend:
              - 'backend/**'

  # ---------------------------
  # ⚙️ FRONTEND DEPLOY (Amplify)
  # ---------------------------
  frontend:
    needs: detect_changes
    if: needs.detect_changes.outputs.frontend_changed == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: 🧾 Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install Frontend Dependencies
        working-directory: frontend
        run: npm ci

      - name: Build Frontend (ignore ESLint warnings)
        working-directory: frontend
        run: CI=false npm run build

      - name: Install AWS Amplify CLI
        run: npm install -g @aws-amplify/cli

      - name: 🚀 Publish Frontend to AWS Amplify
        run: amplify publish --yes
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_REGION: ap-south-1

  # ---------------------------
  # ⚙️ BACKEND DEPLOY (Elastic Beanstalk)
  # ---------------------------
  backend:
    needs: detect_changes
    if: needs.detect_changes.outputs.backend_changed == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: 🧾 Checkout Repository
        uses: actions/checkout@v4

      - name: Check AWS CLI version
        run: aws --version

      - name: Prepare Backend Zip for Deployment
        working-directory: backend
        run: |
          echo "Zipping backend excluding node_modules..."
          zip -r ../backend.zip . -x "node_modules/*"

      - name: Verify Backend Zip Exists
        run: |
          ls -lh backend.zip || echo "❌ backend.zip not found!"
          ls -lh backend

      - name: 🚀 Deploy to Elastic Beanstalk
        uses: einaregilsson/beanstalk-deploy@v21
        with:
          aws_access_key: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws_secret_key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          application_name: Mob13r-Backend
          environment_name: Mob13r-backend-env-1
          region: ap-south-1
          version_label: build-${{ github.run_number }}
          deployment_package: backend.zip

  # ---------------------------
  # ✅ Summary
  # ---------------------------
  summary:
    runs-on: ubuntu-latest
    needs: [frontend, backend]
    if: always()
    steps:
      - name: ✅ Deployment Summary
        run: echo "🎉 Auto Deploy Completed Successfully!"
