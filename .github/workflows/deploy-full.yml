name: 🚀 Auto Deploy Frontend (Amplify) + Backend (Elastic Beanstalk)

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: 🧾 Checkout Repository
        uses: actions/checkout@v4

      # ---------------------------
      # ⚙️ Setup Node.js for Frontend
      # ---------------------------
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      # ---------------------------
      # 📦 FRONTEND BUILD (React)
      # ---------------------------
      - name: Install Frontend Dependencies
        working-directory: frontend
        run: npm ci

      - name: Build Frontend
        working-directory: frontend
        run: npm run build

      - name: ⚡ Deploy Frontend to AWS Amplify
        uses: webfactory/amplify-cli-action@v3
        with:
          amplify_command: publish
          amplify_env: prod
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_REGION: ap-south-1

      # ---------------------------
      # ⚙️ BACKEND DEPLOY (Elastic Beanstalk)
      # ---------------------------

      - name: 🔍 Verify AWS CLI (preinstalled)
        run: aws --version

      - name: Prepare Backend Package
        working-directory: backend
        run: |
          echo "Zipping backend folder excluding node_modules..."
          zip -r ../backend.zip . -x "node_modules/*"

      - name: 🔎 Debug Files Before Upload
        run: |
          echo "---- LISTING REPO ROOT ----"
          ls -al
          echo "---- LISTING BACKEND FOLDER ----"
          ls -al backend || echo "No backend folder found!"
          echo "---- CHECKING ZIP ----"
          ls -al backend.zip || echo "backend.zip NOT FOUND!"

      - name: 🚀 Deploy to Elastic Beanstalk
        uses: einaregilsson/beanstalk-deploy@v21
        with:
          aws_access_key: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws_secret_key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          application_name: Mob13r-Backend
          environment_name: Mob13r-backend-env-1
          region: ap-south-1
          version_label: build-${{ github.run_number }}
          deployment_package: backend.zip

      - name: ✅ Deployment Complete
        run: echo "🎉 Frontend + Backend deployed successfully!"
