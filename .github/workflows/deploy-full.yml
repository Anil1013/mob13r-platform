      # ---------------------------
      # FRONTEND (Amplify)
      # ---------------------------
      - name: 🚀 Trigger Amplify Hosting build (safe)
        run: |
          APP_ID="d2ujj546i3rguh"
          BRANCH="main"
          echo "Starting Amplify build for $APP_ID ($BRANCH)..."

          STATUS=$(aws amplify list-jobs --app-id "$APP_ID" --branch-name "$BRANCH" \
            --max-items 1 | jq -r '.jobSummaries[0].status // empty')

          if [[ "$STATUS" == "PENDING" || "$STATUS" == "RUNNING" ]]; then
            echo "⚠️ Amplify already has a pending/running build. Skipping new start."
            exit 0
          fi

          JOB_JSON=$(aws amplify start-job --app-id "$APP_ID" --branch-name "$BRANCH" --job-type RELEASE)
          echo "$JOB_JSON"
          echo "✅ Amplify job started successfully."
