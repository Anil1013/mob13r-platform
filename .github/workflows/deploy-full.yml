name: 🚀 Deploy Mob13r Platform (Backend + Frontend)

on:
  push:
    branches:
      - main
  workflow_dispatch:  # allows manual trigger from GitHub Actions tab

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Checkout the repository
      - name: Checkout Repository
        uses: actions/checkout@v4

      # 2️⃣ Set up Node.js 18 (matches your Elastic Beanstalk + React build)
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      # 3️⃣ Install and package backend
      - name: 📦 Install Backend Dependencies
        run: |
          cd backend
          npm install

      # 4️⃣ Create backend .env file dynamically from GitHub Secrets
      - name: 🔐 Create Backend .env
        run: |
          cd backend
          echo "DB_HOST=${{ secrets.DB_HOST }}" >> .env
          echo "DB_PORT=${{ secrets.DB_PORT }}" >> .env
          echo "DB_USER=${{ secrets.DB_USER }}" >> .env
          echo "DB_PASS=${{ secrets.DB_PASS }}" >> .env
          echo "DB_NAME=${{ secrets.DB_NAME }}" >> .env
          echo "PORT=8080" >> .env
          echo "NODE_ENV=production" >> .env

      # 5️⃣ Zip backend for AWS Elastic Beanstalk
      - name: 📦 Package Backend
        run: |
          cd backend
          zip -r ../backend.zip .

      # 6️⃣ Deploy backend to Elastic Beanstalk
      - name: 🚀 Deploy Backend to AWS Elastic Beanstalk
        uses: einaregilsson/beanstalk-deploy@v21
        with:
          aws_access_key: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws_secret_key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          application_name: "Mob13r-Backend"
          environment_name: "Mob13r-backend-env-1"
          region: "ap-south-1"
          version_label: "build-${{ github.run_number }}"
          deployment_package: "backend.zip"

      # 7️⃣ Install and build frontend (React)
      - name: 🧱 Build Frontend (React)
        run: |
          cd frontend
          npm install
          npm run build

      # 8️⃣ Deploy frontend to AWS Amplify
      - name: 🌐 Deploy Frontend to AWS Amplify
        uses: ambientlight/amplify-cli-action@v2
        with:
          amplify_command: publish
          amplify_env: main               # ✅ confirmed from Amplify
          amplify_app_id: ${{ secrets.AMPLIFY_APP_ID }}  # e.g. d2ujj546i3rguh
          amplify_branch: main
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_REGION: ap-south-1
