name: Unified Auto Deploy (Frontend + Backend)

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ---------- FRONTEND ----------
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install frontend deps
        working-directory: frontend
        run: npm ci

      - name: Build frontend (ignore warnings)
        working-directory: frontend
        run: CI=false npm run build

      # Use Amplify Hosting backend to publish the already-connected app/branch
      - name: Trigger Amplify Hosting build (safe)
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_REGION: ap-south-1
        run: |
          APP_ID="d2ujj546i3rguh"
          BRANCH="main"
          echo "Starting Amplify build for $APP_ID ($BRANCH)..."
          STATUS=$(aws amplify list-jobs --app-id "$APP_ID" --branch-name "$BRANCH" --max-items 1 | jq -r '.jobSummaries[0].status // empty')
          if [[ "$STATUS" == "PENDING" || "$STATUS" == "RUNNING" ]]; then
            echo "Amplify already has a pending/running build. Skipping new start."
            exit 0
          fi
          aws amplify start-job --app-id "$APP_ID" --branch-name "$BRANCH" --job-type RELEASE
          echo "Amplify job triggered."

      # ---------- BACKEND ----------
      - name: Verify AWS CLI
        run: aws --version

      - name: Create backend.zip
        working-directory: backend
        run: zip -r ../backend.zip . -x "node_modules/*"

      - name: List packaged files
        run: |
          ls -al
          ls -al backend || true
          ls -al backend.zip || echo "backend.zip missing!"

      - name: Deploy to Elastic Beanstalk
        uses: einaregilsson/beanstalk-deploy@v21
        with:
          aws_access_key: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws_secret_key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          application_name: Mob13r-Backend
          environment_name: Mob13r-backend-env-1
          region: ap-south-1
          version_label: build-${{ github.run_number }}-${{ github.sha }}
          use_existing_version_if_available: true
          deployment_package: backend.zip

      - name: Done
        run: echo "Frontend + Backend deployed."
