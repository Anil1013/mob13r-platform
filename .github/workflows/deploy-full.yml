name: Deploy Full Mob13r Platform (Backend + Frontend)

on:
  push:
    branches:
      - main
  workflow_dispatch:  # Allows manual trigger from Actions tab

jobs:
  deploy:
    name: 🚀 Deploy Mob13r Backend + Frontend
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Checkout Repository
      - name: 🧾 Checkout repository
        uses: actions/checkout@v4

      # 2️⃣ Setup Node.js
      - name: 🧰 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      # 3️⃣ Install and Build Frontend (React)
      - name: 🧱 Build Frontend (React)
        run: |
          cd frontend
          npm install
          echo "REACT_APP_API_URL=${{ secrets.REACT_APP_API_URL }}" >> .env
          echo "REACT_APP_APP_NAME=Mob13r" >> .env
          echo "REACT_APP_THEME=dark" >> .env
          npm run build
          cd ..

      # 4️⃣ Install Backend Dependencies
      - name: 📦 Install Backend Dependencies
        run: |
          cd backend
          npm install
          cd ..

      # 5️⃣ Create Backend .env file from GitHub Secrets
      - name: ⚙️ Create Backend .env
        run: |
          cd backend
          echo "DB_HOST=${{ secrets.DB_HOST }}" >> .env
          echo "DB_PORT=${{ secrets.DB_PORT }}" >> .env
          echo "DB_USER=${{ secrets.DB_USER }}" >> .env
          echo "DB_PASS=${{ secrets.DB_PASS }}" >> .env
          echo "DB_NAME=${{ secrets.DB_NAME }}" >> .env
          echo "PORT=8080" >> .env
          echo "NODE_ENV=production" >> .env
          echo "CORS_ORIGIN=https://dashboard.mob13r.com" >> .env

      # 6️⃣ Package Backend + Built Frontend for EB
      - name: 🗜️ Package Backend + Frontend
        run: |
          zip -r deploy.zip backend frontend/build Procfile package.json >/dev/null

      # 7️⃣ Deploy Backend to AWS Elastic Beanstalk
      - name: 🚀 Deploy Backend to AWS Elastic Beanstalk
        uses: einaregilsson/beanstalk-deploy@v21
        with:
          aws_access_key: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws_secret_key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          application_name: "Mob13r-Backend"
          environment_name: "Mob13r-backend-env-1"
          region: "ap-south-1"
          version_label: "build-${{ github.run_number }}"
          deployment_package: "deploy.zip"

      # 8️⃣ Deploy Frontend to AWS Amplify
      - name: 🌐 Deploy Frontend to AWS Amplify
        uses: ambientlight/amplify-cli-action@v2
        with:
          amplify_command: publish
          amplify_env: main
          amplify_app_id: ${{ secrets.AMPLIFY_APP_ID }}
          amplify_branch: main
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_REGION: ap-south-1
