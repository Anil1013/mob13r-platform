name: 🚀 Unified Auto Deploy (Frontend + Backend)

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      # ---------------------------
      # 🧾 Checkout Repository
      # ---------------------------
      - name: Checkout Repository
        uses: actions/checkout@v4

      # ---------------------------
      # ⚙️ Setup Node.js
      # ---------------------------
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      # ---------------------------
      # 🧱 FRONTEND (React + Amplify)
      # ---------------------------
      - name: Install Frontend Dependencies
        working-directory: frontend
        run: npm ci

      - name: Build Frontend (ignore ESLint warnings)
        working-directory: frontend
        run: CI=false npm run build

      - name: Install Amplify CLI
        run: npm install -g @aws-amplify/cli

      - name: 🚀 Deploy Frontend to AWS Amplify
        run: amplify publish --yes
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_REGION: ap-south-1

      # ---------------------------
      # ⚙️ BACKEND (Elastic Beanstalk)
      # ---------------------------
      - name: Check AWS CLI version
        run: aws --version

      - name: Prepare Backend Zip
        working-directory: backend
        run: |
          echo "Creating backend.zip for Elastic Beanstalk..."
          zip -r ../backend.zip . -x "node_modules/*"

      - name: Verify Backend Package
        run: |
          ls -lh backend.zip || echo "❌ backend.zip not found!"
          echo "✅ Backend package ready for deploy"

      - name: 🚀 Deploy Backend to Elastic Beanstalk
        uses: einaregilsson/beanstalk-deploy@v21
        with:
          aws_access_key: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws_secret_key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          application_name: Mob13r-Backend
          environment_name: Mob13r-backend-env-1
          region: ap-south-1
          version_label: build-${{ github.run_number }}
          deployment_package: backend.zip

      # ---------------------------
      # ✅ DONE
      # ---------------------------
      - name: ✅ Deployment Complete
        run: echo "🎉 Frontend and Backend deployed together successfully!"
