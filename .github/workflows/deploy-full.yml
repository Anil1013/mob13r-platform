name: 🚀 Unified Auto Deploy (Frontend + Backend)

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      # 1) Checkout
      - name: 🧾 Checkout
        uses: actions/checkout@v4

      # 2) AWS credentials for CLI
      - name: 🔐 Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-south-1

      # ---------------------------
      # FRONTEND: Trigger Amplify Hosting build for your connected repo
      # ---------------------------
      - name: 🚀 Trigger Amplify Hosting build
        run: |
          APP_ID="d2ujj546i3rguh"
          BRANCH="main"
          echo "Starting Amplify job for $APP_ID ($BRANCH)…"
          JOB_JSON=$(aws amplify start-job --app-id "$APP_ID" --branch-name "$BRANCH" --job-type RELEASE)
          echo "$JOB_JSON"
          echo "AMPLIFY_JOB_ID=$(echo "$JOB_JSON" | jq -r '.jobSummary.jobId // .job.jobId')" >> $GITHUB_ENV || true

      # (Optional) wait for Amplify to finish — uncomment to block until done
      # - name: ⏳ Wait for Amplify job to finish (optional)
      #   run: |
      #     APP_ID="d2ujj546i3rguh"
      #     BRANCH="main"
      #     JOB_ID="${AMPLIFY_JOB_ID}"
      #     echo "Waiting for Amplify job: $JOB_ID"
      #     for i in {1..60}; do
      #       STATUS=$(aws amplify get-job --app-id "$APP_ID" --branch-name "$BRANCH" --job-id "$JOB_ID" \
      #         | jq -r '.job.summary.status // .jobSummary.status')
      #       echo "Amplify status: $STATUS"
      #       if [ "$STATUS" = "SUCCEED" ]; then exit 0; fi
      #       if [ "$STATUS" = "FAILED" ] || [ "$STATUS" = "CANCELLED" ]; then exit 1; fi
      #       sleep 20
      #     done
      #     echo "Timed out waiting for Amplify job"; exit 1

      # ---------------------------
      # BACKEND: Deploy to Elastic Beanstalk
      # ---------------------------
      - name: 🧰 Check AWS CLI
        run: aws --version

      - name: 📦 Package backend
        working-directory: backend
        run: |
          echo "Creating backend.zip (excluding node_modules, .env)…"
          zip -r ../backend.zip . \
            -x "node_modules/*" ".env" ".git/*" "aws/*" "awscliv2.zip"

      - name: 🔎 Verify package
        run: ls -lh backend.zip

      - name: 🚀 Deploy to Elastic Beanstalk
        uses: einaregilsson/beanstalk-deploy@v21
        with:
          aws_access_key: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws_secret_key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          application_name: Mob13r-Backend
          environment_name: Mob13r-backend-env-1
          region: ap-south-1
          version_label: build-${{ github.run_number }}
          deployment_package: backend.zip

      - name: ✅ Done
        run: echo "Frontend (Amplify) + Backend (EB) deployment kicked off successfully."
