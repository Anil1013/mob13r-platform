name: 🚀 Auto Deploy Frontend (Amplify) + Backend (Elastic Beanstalk)

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      # ---------------------------
      # 🧾 Checkout code
      # ---------------------------
      - name: Checkout repository
        uses: actions/checkout@v4

      # ---------------------------
      # ⚙️ FRONTEND BUILD
      # ---------------------------
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Build frontend
        working-directory: frontend
        run: npm run build

      - name: Deploy frontend to Amplify
        uses: webfactory/amplify-cli-action@v3
        with:
          amplify_command: publish
          amplify_env: prod
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_REGION: ap-south-1

      # ---------------------------
      # ⚙️ BACKEND DEPLOY
      # ---------------------------

      - name: Check AWS CLI version
        run: |
          echo "✅ Using preinstalled AWS CLI"
          aws --version

      - name: Prepare backend zip for deployment
        working-directory: backend
        run: |
          echo "Zipping backend excluding node_modules..."
          zip -r ../backend.zip . -x "node_modules/*"

      - name: Verify backend.zip exists
        run: |
          ls -lh backend.zip || echo "❌ backend.zip not found!"
          ls -lh backend

      - name: Deploy to Elastic Beanstalk
        uses: einaregilsson/beanstalk-deploy@v21
        with:
          aws_access_key: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws_secret_key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          application_name: Mob13r-Backend
          environment_name: Mob13r-backend-env-1
          region: ap-south-1
          version_label: build-${{ github.run_number }}
          deployment_package: backend.zip

      - name: ✅ All deployments complete
        run: echo "🎉 Frontend + Backend deployed successfully!"
