name: 🚀 Auto Deploy Backend to AWS Elastic Beanstalk

on:
  push:
    branches:
      - main   # ✅ Trigger on push to main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: 🧩 Checkout repository
        uses: actions/checkout@v4

      - name: ⚙️ Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: 📦 Install dependencies
        run: |
          cd backend
          npm install

      - name: 🔐 Create .env file from GitHub Secrets
        run: |
          cd backend
          echo "DB_HOST=${{ secrets.DB_HOST }}" >> .env
          echo "DB_PORT=${{ secrets.DB_PORT }}" >> .env
          echo "DB_USER=${{ secrets.DB_USER }}" >> .env
          echo "DB_PASS=${{ secrets.DB_PASS }}" >> .env
          echo "DB_NAME=${{ secrets.DB_NAME }}" >> .env
          echo "PORT=8080" >> .env
          echo "NODE_ENV=production" >> .env

      - name: 🗜️ Zip backend for deployment
        run: |
          cd backend
          zip -r ../backend.zip .

      - name: 🚀 Deploy to Elastic Beanstalk
        uses: einaregilsson/beanstalk-deploy@v21
        with:
          aws_access_key: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws_secret_key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          application_name: "Mob13r-Backend"
          environment_name: "Mob13r-backend-env-1"
          region: "ap-south-1"
          version_label: "build-${{ github.run_number }}"
          deployment_package: "backend.zip"
