name: Mob13r Smart Bot (Super Fast & Queue)

on:
  push:
    branches: [ main ] # Jaise hi aap push karenge, ye turant chalega
  workflow_dispatch: # Manual button ke liye

# Ye line ensure karti hai ki deployments line mein rahein (Pending Queue)
concurrency:
  group: mob13r-deploy-queue
  cancel-in-progress: false 

jobs:
  ai-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT_TOKEN }}

      - name: AI Processing (Telegram Command)
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          pip install google-generativeai requests
          python scripts/ai_fixer.py
          
          git config --global user.name "Mob13r-Bot"
          git config --global user.email "bot@mob13r.com"
          
          # Agar AI ne code change kiya hai toh commit karo
          if [[ -n $(git status -s) ]]; then
            git add .
            git commit -m "AI Update: Based on Telegram instruction"
            git push
            curl -s -X POST https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage \
            -d chat_id=${{ secrets.TELEGRAM_CHAT_ID }} -d text="✅ AI ne code update kar diya hai! Ab AWS Deploy shuru ho raha hai..."
          fi

      - name: AWS Deployment (Amplify & Beanstalk)
        run: |
          # Amplify Frontend
          aws amplify start-job --app-id ${{ secrets.AMPLIFY_APP_ID }} --branch-name main --job-type RELEASE
          # Beanstalk Backend
          zip -r deploy.zip backend/
          aws elasticbeanstalk update-environment --environment-name ${{ secrets.EB_ENV_NAME }} --version-label ${{ github.sha }}
          
          curl -s -X POST https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage \
          -d chat_id=${{ secrets.TELEGRAM_CHAT_ID }} -d text="🚀 Updates AWS par live ho gaye hain!"
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: 'ap-south-1' # Aapka AWS region yahan check kar lein
