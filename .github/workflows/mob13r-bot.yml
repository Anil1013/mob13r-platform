name: Mob13r Full-Autonomous Robo

on:
  repository_dispatch:
    types: [telegram_cmd]
  workflow_dispatch:

jobs:
  robo-job:
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Initialize Repo
        uses: actions/checkout@v4

      - name: 🤖 Robo Processing
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          # Cloudflare se bhej gaya message yahan receive hoga
          USER_MSG: ${{ github.event.client_payload.msg }}
        run: |
          # Step 1: Inform User
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
          -d "chat_id=${{ secrets.TELEGRAM_CHAT_ID }}" \
          -d "text=⚙️ Mob13r-Robo: Jaag raha hoon aur aapki command par kaam kar raha hoon..."
          
          pip install --upgrade google-generativeai requests
          
          # Step 2: Run Script with Message
          python scripts/ai_fixer.py "$USER_MSG"
          
          # Step 3: Git Push (Agar code change hua ho)
          git config --global user.name "Mob13r-Robo"
          git config --global user.email "robo@mob13r.com"
          if [[ -n $(git status -s) ]]; then
            git add .
            git commit -m "Robo-Update: $USER_MSG"
            git push origin main
          fi
