name: Mob13r Smart Bot

on:
  push:
    branches: [ main ]
  schedule:
    - cron: '*/5 * * * *' # Har 5 minute mein Telegram check karega

jobs:
  audit:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Code Check
        run: |
          cd backend && npm install && node --check server.js || echo "ERR=true" >> $GITHUB_ENV
          cd ../frontend && npm install && npm run build || echo "ERR=true" >> $GITHUB_ENV
      - name: Notify Telegram
        run: |
          if [ "${{ env.ERR }}" == "true" ]; then MSG="⚠️ Error in code! Type 'Fix' to repair."; else MSG="✅ Build Success! Type 'Deploy' to AWS."; fi
          curl -s -X POST https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage -d chat_id=${{ secrets.TELEGRAM_CHAT_ID }} -d text="$MSG"

  listen-and-act:
    if: github.event_name == 'schedule'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT_TOKEN }}
      
      - name: Check Telegram Message
        id: telegram
        run: |
          # Last message fetch karna
          RAW_RESPONSE=$(curl -s https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/getUpdates)
          LAST_MSG=$(echo $RAW_RESPONSE | jq -r '.result[-1].message.text' | tr '[:upper:]' '[:lower:]')
          echo "COMMAND=$LAST_MSG" >> $GITHUB_ENV

      - name: AI Fix Execution
        if: env.COMMAND == 'fix'
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          pip install google-generativeai
          python scripts/ai_fixer.py
          git config --global user.name "Mob13r-Bot"
          git config --global user.email "bot@mob13r.com"
          git add . && git commit -m "AI Auto-Fix" && git push
          curl -s -X POST https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage -d chat_id=${{ secrets.TELEGRAM_CHAT_ID }} -d text="🛠 Fix complete and pushed!"

      - name: AWS Deploy Execution
        if: env.COMMAND == 'deploy'
        run: |
          aws amplify start-job --app-id ${{ secrets.AMPLIFY_APP_ID }} --branch-name main --job-type RELEASE
          zip -r deploy.zip backend/
          aws elasticbeanstalk update-environment --environment-name ${{ secrets.EB_ENV_NAME }} --version-label ${{ github.sha }}
          curl -s -X POST https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage -d chat_id=${{ secrets.TELEGRAM_CHAT_ID }} -d text="🚀 Deployed to AWS!"
