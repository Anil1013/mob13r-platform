name: Mob13r Smart Bot (Ultra Stable)

on:
  push:
    branches: [ main ]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true 
  AWS_REGION: 'ap-south-1' 

concurrency:
  group: mob13r-deploy-queue
  cancel-in-progress: false 

jobs:
  ai-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT_TOKEN }}
          fetch-depth: 0

      - name: 🐍 Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: 🤖 AI Processing (Gemini Update)
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          pip install google-generativeai requests
          python scripts/ai_fixer.py
          
          git config --global user.name "Mob13r-Bot"
          git config --global user.email "bot@mob13r.com"
          
          if [[ -n $(git status -s) ]]; then
            git add .
            git commit -m "AI Update: Based on Telegram instruction"
            git push origin main
            curl -s -X POST https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage \
            -d chat_id=${{ secrets.TELEGRAM_CHAT_ID }} -d text="✅ AI ne code update kar diya hai! Amplify auto-build shuru ho gaya hai."
          else
            echo "No changes detected."
          fi

      - name: 🚀 AWS Beanstalk Deployment (Backend)
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        run: |
          # 1. Prepare Backend Bundle (Amplify line hata di gayi hai)
          zip -r deploy.zip . -x "node_modules/*" ".git/*" ".github/*"
          
          # 2. Beanstalk Backend Update
          aws elasticbeanstalk update-environment \
            --environment-name ${{ secrets.EB_ENV_NAME }} \
            --version-label "deploy-${{ github.sha }}" \
            --region ${{ env.AWS_REGION }}
          
          # 3. Final Notification
          curl -s -X POST https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage \
          -d chat_id=${{ secrets.TELEGRAM_CHAT_ID }} -d text="🚀 Backend updates Beanstalk par bhej diye gaye hain! Frontend Amplify par auto-sync ho raha hai."
