name: Mob13r Smart Bot (Ultra Stable)

on:
  push:
    branches: [ main ]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true 
  AWS_REGION: 'ap-south-1' 
  EB_APP_NAME: 'Mb13r-backend' # Aapka App Name
  EB_ENV_NAME: 'Mb13r-backend-env' # Aapka Env Name

concurrency:
  group: mob13r-deploy-queue
  cancel-in-progress: false 

jobs:
  ai-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT_TOKEN }}
          fetch-depth: 0

      - name: 🐍 Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: 🤖 AI Processing
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          pip install google-generativeai requests
          python scripts/ai_fixer.py
          git config --global user.name "Mob13r-Bot"
          git config --global user.email "bot@mob13r.com"
          if [[ -n $(git status -s) ]]; then
            git add .
            git commit -m "AI Update: Based on Telegram instruction"
            git push origin main
          fi

      - name: 🚀 AWS Deploy (Upload + Update)
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        run: |
          # 1. Create Zip
          zip -r deploy.zip . -x "node_modules/*" ".git/*" ".github/*"
          
          # 2. Get S3 Bucket from Beanstalk
          S3_BUCKET=$(aws elasticbeanstalk describe-applications --application-names "${{ env.EB_APP_NAME }}" --region ${{ env.AWS_REGION }} --query 'Applications[0].ResourceLifecycleConfig.ServiceRole' --output text | cut -d: -f6 | echo "elasticbeanstalk-${{ env.AWS_REGION }}-257394496678")
          
          # 3. Upload to S3
          aws s3 cp deploy.zip s3://$S3_BUCKET/deploy-${{ github.sha }}.zip
          
          # 4. Create New Application Version (Ye step missing tha)
          aws elasticbeanstalk create-application-version \
            --application-name "${{ env.EB_APP_NAME }}" \
            --version-label "v-${{ github.sha }}" \
            --source-bundle S3Bucket="$S3_BUCKET",S3Key="deploy-${{ github.sha }}.zip" \
            --region ${{ env.AWS_REGION }}
          
          # 5. Update Environment
          aws elasticbeanstalk update-environment \
            --environment-name "${{ env.EB_ENV_NAME }}" \
            --version-label "v-${{ github.sha }}" \
            --region ${{ env.AWS_REGION }}
          
          # 6. Notify
          curl -s -X POST https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage \
          -d chat_id=${{ secrets.TELEGRAM_CHAT_ID }} -d text="🚀 Backend version v-${{ github.sha }} successfully deployed!"
